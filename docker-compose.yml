services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/context-engine-dev
      NEO4J_PLUGINS: "[]"
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      CE_NEO4J_URI: bolt://neo4j:7687
      CE_NEO4J_USER: neo4j
      CE_NEO4J_PASSWORD: context-engine-dev
      CE_LOG_LEVEL: info
    depends_on:
      neo4j:
        condition: service_healthy

  admin:
    build: ./admin/graph-viewer
    ports:
      - "3000:3000"
    # The admin UI is a browser app: point it at the host-reachable API URL
    # (http://localhost:8000) from the fields in the UI, not this internal name.
    environment:
      API_URL: http://api:8000
    depends_on:
      - api

volumes:
  neo4j_data:
